# Speak Input — example configuration.
#
# Copy this to the user config dir on first run:
#   cp config.example.toml ~/Library/Application\ Support/speakinput/config.toml
# or use the helper from the project root:
#   ./start.sh          # does the copy for you if config.toml is missing
#
# Every field shown here is the default the program uses when no config
# file is present.
#
# Speak Input runs one OR two profiles. A profile binds one hotkey to
# one STT setup (model + language + prompt). The typical use is two
# profiles so a single key speaks one language:
#
#   - primary:   right alt   (or right ctrl on Linux/Windows) → English
#   - secondary: right cmd   (or Super on Linux/Windows)    → Chinese
#
# Hold right alt, speak English, release → text is typed in English.
# Hold right cmd, speak Chinese, release → text is typed in Chinese.
# Whisper never has to guess the language, and the encoder doesn't pay
# for a language-ID pass on every utterance.
#
# To use only one language, delete the entire [profile.secondary]
# block — the right-alt key keeps working, the right-cmd key is not
# wired, and only the primary model is loaded.
#
# The two profiles can share the same model file. The default uses
# `small` (multilingual) for both, and the program loads it into RAM
# once. To speed up the English path, set `primary.model = "small.en"`
# — note that the secondary profile's language must then be `en` or
# `auto` to keep the model valid.

# --- profile 1 (required) --------------------------------------------------
# The primary profile. Hold this key to record; release to inject.
# The default key is platform-aware: alt_r on macOS, ctrl_r on Linux/Windows.

[profile.primary]
key = "alt_r"               # alt_r | ctrl_r | cmd_r | shift_r | caps_lock | f12
                            # Default is platform-aware: alt_r on macOS,
                            # ctrl_r on Linux/Windows. Override here.
model = "small"             # tiny.en | base.en | small.en
                            # tiny | base | small | medium  (multilingual)
language = "auto"           # auto | en | zh
                            # 'auto' lets whisper detect; pin 'en' to skip
                            # the language-ID pass (faster).
beam_size = 1               # 1 = greedy (fastest); 2..10 = beam search
# zh_conversion = true      # Convert Chinese output to Traditional Chinese.
                            # When the recognized text contains Chinese
                            # characters, it is converted via OpenCC (s2t).
                            # Set false to disable (output as-is from the
                            # model). On by default.
# initial_prompt = "C, C++, Rust, RTOS, FreeRTOS, GPIO, UART, SPI, I2C, DMA, ISR, scheduler, mutex, GDB, OpenOCD, JTAG, ..."
                            # bias the decoder toward specific vocabulary;
                            # see README "Initial prompt" section. The default
                            # is an embedded-software-engineer bias; set to ""
                            # to disable.

# --- profile 2 (optional, disabled by default) ----------------------------
# Uncomment the entire block below to add a second language on a
# second hotkey. On macOS, the default key is `cmd_r` (right Command).
# On Linux/Windows `cmd_r` is mapped to the Super key by pynput.
#
# With this block commented out, only the primary key is wired and
# only the primary model is loaded into RAM.

# [profile.secondary]
# key = "cmd_r"
# model = "small"
# language = "zh"           # explicit language — skips the auto-detect pass
# beam_size = 1
# # zh_conversion = true    # same as primary (default on)
# # initial_prompt = "C, C++, Rust, RTOS, FreeRTOS, GPIO, UART, SPI, I2C, DMA, ISR, scheduler, mutex, GDB, OpenOCD, JTAG, ..."
                            # per-profile lexical bias; same vocabulary bank
                            # as primary by default.

# --- global audio / injection ---------------------------------------------

[audio]
sample_rate = 16000         # whisper expects 16 kHz; do not change
silence_threshold = 0.005   # RMS floor used by the silence gate and the
                            # auto-stop watchdog. Audio below this is
                            # treated as silence. 0 disables both.
auto_stop_seconds = 0       # auto-stop after this many seconds of
                            # continuous silence while the key is held.
                            # Trailing silence is also trimmed from the
                            # buffer before transcribe. 0 disables —
                            # the user releases the key themselves
                            # (default). Set to a typical end-of-
                            # sentence pause (e.g. 0.8) to enable the
                            # chunked auto-stop.
prev_clip_window_seconds = 60   # When the next press starts within this
                                # many seconds of the previous
                                # transcription, that text is appended
                                # to `initial_prompt` as a continuity
                                # hint ("picking up where I left
                                # off"). The within-press chunk
                                # (across auto-stop chunks) is always
                                # passed regardless of this window.
                                # 0 disables the across-press hint.
# pause_media = true        # Pause any playing media when the hotkey is
                            # pressed and resume on release. Set false
                            # to disable. Linux requires playerctl;
                            # macOS uses osascript; Windows uses
                            # PowerShell SMTC.
# device = null             # uncomment to pin a specific input device;
                            # use `speakinput --list-devices` to see indices

[inject]
restore_clipboard_ms = 50   # how long to wait before restoring the prior
                            # clipboard contents (Unicode paste path only)
trailing_space = true       # append a single space after each transcript
                            # (set false for code editors)
# backend = "auto"          # Output injection backend. One of:
                            #   "auto"    — platform-driven (recommended)
                            #   "pynput"  — pynput (macOS / Windows / X11 Linux)
                            #   "wtype"   — wtype (wlroots Wayland, daemon-free)
                            #   "ydotool" — ydotool (Wayland, needs ydotoold)
                            # On Linux Wayland, "auto" tries wtype first,
                            # then ydotool, then falls back to pynput.

[transcribe]
# use_gpu = "auto"          # Enable GPU acceleration. One of:
                            #   "auto"  — use GPU if the wheel has one (default)
                            #   true    — force on (warns if wheel is CPU-only)
                            #   false   — force CPU
                            # To enable GPU on Linux, you must rebuild the
                            # pywhispercpp wheel — see README → 'GPU acceleration'.
                            # The shipped wheel is CPU-only.
# gpu_device = 0            # GPU index when multiple are present
# n_threads = 0             # CPU threads for the CPU path. 0 = auto
                            # (pywhispercpp's default: min(4, cores)).
                            # Bump this on big x86 boxes (16+ cores) where
                            # the default leaves cores idle.
